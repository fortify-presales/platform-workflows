name: Reusable Sonatype SCA

on:
  workflow_call:
    inputs:
      application_id:
        description: Sonatype Lifecycle application public ID (optional; defaults to repository name when empty)
        required: false
        type: string
        default: ""
      organization_id:
        description: Sonatype Lifecycle organization ID or public ID (optional; defaults to repository owner)
        required: false
        type: string
        default: ""
      create_application_if_missing:
        description: Create Sonatype Lifecycle application if it does not exist
        required: false
        type: boolean
        default: false
      stage:
        description: Evaluation stage
        required: false
        type: string
        default: build
      scan_targets:
        description: Space-separated scan targets
        required: false
        type: string
        default: package.json package-lock.json
      runner:
        description: Runner label
        required: false
        type: string
        default: ubuntu-latest
      upload_result_artifact:
        description: Upload scanner result artifact
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write

jobs:
  sonatype:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Sonatype org and application
        id: resolve-sonatype-app
        shell: pwsh
        env:
          IQ_SERVER_URL: ${{ vars.LIFECYCLE_SERVER_URL }}
          IQ_USERNAME: ${{ secrets.LIFECYCLE_USERNAME }}
          IQ_PASSWORD: ${{ secrets.LIFECYCLE_PASSWORD }}
          SONATYPE_CSRF_TOKEN: ${{ secrets.LIFECYCLE_CSRF_TOKEN }}
          INPUT_APPLICATION_ID: ${{ inputs.application_id }}
          INPUT_ORGANIZATION_ID: ${{ inputs.organization_id }}
          INPUT_CREATE_APPLICATION: ${{ inputs.create_application_if_missing }}
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          $appId = if ([string]::IsNullOrWhiteSpace($env:INPUT_APPLICATION_ID)) { $env:REPOSITORY_NAME } else { $env:INPUT_APPLICATION_ID }
          $orgName = if ([string]::IsNullOrWhiteSpace($env:INPUT_ORGANIZATION_ID)) { $env:REPOSITORY_OWNER } else { $env:INPUT_ORGANIZATION_ID }

          "application_id=$appId" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "organization_name=$orgName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          if ($env:INPUT_CREATE_APPLICATION -ne "true") {
            Write-Host "Skipping Sonatype application auto-create; create_application_if_missing=false"
            return
          }

          if ([string]::IsNullOrWhiteSpace($env:IQ_SERVER_URL)) {
            throw "LIFECYCLE_SERVER_URL is required when create_application_if_missing=true."
          }
          if ([string]::IsNullOrWhiteSpace($env:IQ_USERNAME) -or [string]::IsNullOrWhiteSpace($env:IQ_PASSWORD)) {
            throw "LIFECYCLE_USERNAME and LIFECYCLE_PASSWORD are required when create_application_if_missing=true."
          }
          if ([string]::IsNullOrWhiteSpace($orgName)) {
            throw "organization_id could not be resolved. Set input organization_id or vars.LIFECYCLE_ORGANIZATION_ID conventionally in the caller."
          }

          $baseUrl = $env:IQ_SERVER_URL.TrimEnd('/')
          $authToken = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("$($env:IQ_USERNAME):$($env:IQ_PASSWORD)"))
          $headers = @{
            Authorization = "Basic $authToken"
            Accept = "application/json"
          }
          if (-not [string]::IsNullOrWhiteSpace($env:SONATYPE_CSRF_TOKEN)) {
            $headers['X-CSRF-TOKEN'] = $env:SONATYPE_CSRF_TOKEN
          }

          $encodedOrgName = [uri]::EscapeDataString($orgName)
          $orgLookupUri = "$baseUrl/api/v2/organizations?organizationName=$encodedOrgName"

          try {
            $orgLookupResponse = Invoke-RestMethod -Method Get -Uri $orgLookupUri -Headers $headers
          } catch {
            throw "Failed querying Sonatype organizations at $orgLookupUri. $($_.Exception.Message)"
          }

          $organizationId = $null
          $organizations = @()
          if ($orgLookupResponse -is [System.Array]) {
            $organizations = @($orgLookupResponse)
          } elseif ($null -ne $orgLookupResponse.organizations) {
            $organizations = @($orgLookupResponse.organizations)
          } elseif ($null -ne $orgLookupResponse.items) {
            $organizations = @($orgLookupResponse.items)
          } elseif ($null -ne $orgLookupResponse.id -or $null -ne $orgLookupResponse.name) {
            $organizations = @($orgLookupResponse)
          }

          $matchedOrganization = $organizations | Where-Object { $_.name -eq $orgName } | Select-Object -First 1
          if ($null -ne $matchedOrganization -and -not [string]::IsNullOrWhiteSpace($matchedOrganization.id)) {
            $organizationId = $matchedOrganization.id
          } elseif ($orgName -match '^[0-9a-fA-F]{32}$') {
            $organizationId = $orgName
          } elseif ($organizations.Count -gt 0 -and -not [string]::IsNullOrWhiteSpace($organizations[0].id)) {
            $organizationId = $organizations[0].id
          }

          if ([string]::IsNullOrWhiteSpace($organizationId)) {
            throw "Unable to resolve Sonatype organization ID for '$orgName'."
          }

          $encodedAppId = [uri]::EscapeDataString($appId)
          $lookupUri = "$baseUrl/api/v2/applications?publicId=$encodedAppId"

          try {
            $lookupResponse = Invoke-RestMethod -Method Get -Uri $lookupUri -Headers $headers
          } catch {
            throw "Failed querying Sonatype applications at $lookupUri. $($_.Exception.Message)"
          }

          $applications = @()
          if ($lookupResponse -is [System.Array]) {
            $applications = @($lookupResponse)
          } elseif ($null -ne $lookupResponse.applications) {
            $applications = @($lookupResponse.applications)
          } elseif ($null -ne $lookupResponse.items) {
            $applications = @($lookupResponse.items)
          } elseif ($null -ne $lookupResponse.id -or $null -ne $lookupResponse.publicId) {
            $applications = @($lookupResponse)
          }

          $existing = $applications | Where-Object { $_.publicId -eq $appId } | Select-Object -First 1
          if ($null -ne $existing) {
            Write-Host "Sonatype application '$appId' already exists; continuing"
            return
          }

          $createUri = "$baseUrl/api/v2/applications"
          $createHeaders = @{
            Authorization = "Basic $authToken"
            Accept = "application/json"
            "Content-Type" = "application/json"
          }
          $createPayload = @{ publicId = $appId; name = $appId; organizationId = $organizationId }

          try {
            $jsonBody = $createPayload | ConvertTo-Json -Depth 5
            Invoke-RestMethod -Method Post -Uri $createUri -Headers $createHeaders -Body $jsonBody | Out-Null
            Write-Host "Created Sonatype application '$appId' under organization '$orgName' ($organizationId)"
            return
          } catch {
            throw "Unable to create Sonatype application '$appId' under organization '$orgName' ($organizationId). Verify organization access and application creation permission. $($_.Exception.Message)"
          }

      - name: Run Sonatype evaluate
        id: run-iq-cli
        uses: sonatype/actions/evaluate@v1
        with:
          iq-server-url: ${{ vars.LIFECYCLE_SERVER_URL }}
          username: ${{ secrets.LIFECYCLE_USERNAME }}
          password: ${{ secrets.LIFECYCLE_PASSWORD }}
          application-id: ${{ steps.resolve-sonatype-app.outputs.application_id }}
          stage: ${{ inputs.stage }}
          scan-targets: ${{ inputs.scan_targets }}

      - name: Upload Result File as an artifact
        if: ${{ inputs.upload_result_artifact && !cancelled() && steps.run-iq-cli.outputs.result-file-path }}
        uses: actions/upload-artifact@v4
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: 0
        with:
          name: result-file
          path: ${{ steps.run-iq-cli.outputs.result-file-path }}
